name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'assets/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'assets/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 24
  PNPM_VERSION: 11.15.1
  RUST_TOOLCHAIN: 1.97.1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release version fields
        run: pnpm validate:release

      - name: Validate AI CLI catalog
        run: pnpm validate:ai-catalog

      - name: Lint & type check
        run: pnpm lint

  desktop-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            validation: clippy
          - platform: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            validation: check
          - platform: macos-latest
            target: x86_64-apple-darwin
            validation: check
    
    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt
          targets: ${{ matrix.target }}
      
      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: src-tauri -> target
          shared-key: ci-${{ matrix.target }}
          cache-workspace-crates: true
      
      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build frontend
        run: pnpm build

      - name: Rust format check (Linux)
        if: matrix.validation == 'clippy'
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Clippy (Linux)
        if: matrix.validation == 'clippy'
        run: cargo clippy --locked --target ${{ matrix.target }} --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Desktop compile check
        if: matrix.validation == 'check'
        run: cargo check --locked --target ${{ matrix.target }} --all-targets
        working-directory: src-tauri

  core-test:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-2025-vs2026]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      
      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: src-tauri -> target
          shared-key: core-${{ matrix.platform }}
          cache-workspace-crates: true
      
      - name: Run core tests (without desktop shell)
        run: cargo test --locked --no-default-features --lib
        working-directory: src-tauri
